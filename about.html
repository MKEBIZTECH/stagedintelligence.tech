<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What is Staged Intelligence — SI Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080810;
      color: #e8e8f0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(68,170,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(68,170,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .center {
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(68,170,255,0.6);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 16px;
      opacity: 0.15;
    }
    .soon {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    a {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(68,170,255,0.6);
      text-decoration: none;
      text-transform: uppercase;
    }
    a:hover { color: rgba(68,170,255,1); }
  </style>
</head>
<body>
  <div class="center">
    <p class="eyebrow">Staged Intelligence Tech</p>
    <h1>What is Staged Intelligence</h1>
    <p class="soon">Coming Soon</p>
    <a href="/">← Back to Portfolio</a>
  </div>
</body>
</html>
