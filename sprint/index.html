<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Sprint Guardian — SI Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080810;
      color: #e8e8f0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(68,170,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(68,170,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 80px 32px 120px;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(68,170,255,0.6);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      margin-bottom: 48px;
      line-height: 1.1;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .back {
      display: inline-block;
      margin-top: 48px;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: rgba(68,170,255,0.6);
      text-decoration: none;
      text-transform: uppercase;
    }
    .back:hover { color: rgba(68,170,255,1); }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow">Staged Intelligence Tech</p>
    <h1>Sprint Guardian</h1>
    <div class="video-wrapper">
      <iframe src="https://player.vimeo.com/video/1176965391?title=0&byline=0&portrait=0&badge=0&autopause=0&player_id=0&app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="Sprint Guardian"></iframe>
    </div>
    <a href="/" class="back">← Back to Portfolio</a>
  </div>
</body>
</html>
